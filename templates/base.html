<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="URLGuard — AI-powered malicious URL detection">
    <title>{% block title %}URLGuard{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/">
            <i class="fa-solid fa-shield-halved"></i>
            URLGuard
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <i class="fa-solid fa-bars" style="color:#00d4ff"></i>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                        <i class="fa-solid fa-magnifying-glass"></i> Scanner
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/bulk' %}active{% endif %}" href="/bulk">
                        <i class="fa-solid fa-list-check"></i> Bulk Check
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="/history">
                        <i class="fa-solid fa-clock-rotate-left"></i> History
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
                        <i class="fa-solid fa-chart-pie"></i> Dashboard
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page content -->
<main class="main-content">
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="footer">
    <div class="container text-center">
        <span><i class="fa-solid fa-shield-halved me-2"></i>URLGuard &mdash; AI-Powered Malicious URL Detection</span>
        <span class="ms-3 text-muted" style="font-size:0.8rem;">GBC Model &bull; 30 Features &bull; 96.5% Accuracy</span>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Socket.IO -->
<script src="https://cdn.jsdelivr.net/npm/socket.io@4.7.2/client-dist/socket.io.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
